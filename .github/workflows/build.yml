name: Build

# Trigger the workflow on any push and when a release is published
on:
  push: {}
  pull_request: {}
  release:
    types: [published]

env:
  PYTHONIOENCODING: utf-8

# Set the permissions of GITHUB_TOKEN
permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        CI_ARCH: ["x86", "x64"]  # Define architectures to build for
    env:
      IAPP_ARCH: ${{ matrix.CI_ARCH }}
    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: ${{ runner.os }}-${{ matrix.CI_ARCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.CI_ARCH }}

      - name: Install dependencies and compile resources
        run: |
          uv sync --locked
          uv run invoke dev

      - name: Install NSIS
        uses: repolevedavaj/install-nsis@v1.1.0
        with:
          nsis-version: '3.11'

      - name: Build the project
        run: |
          uv run invoke build
          uv run invoke create-portable
          uv run invoke gen-checksum

      - name: Generate translation catalogs and version info
        if: matrix.CI_ARCH == 'x64'
        run: |
          uv run invoke gen-pot
          uv run invoke update-version-info

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Bookworm-setup-${{ matrix.CI_ARCH }}
          path: scripts\Bookworm-*-${{ matrix.CI_ARCH }}-setup.exe

      - name: Upload portable version
        uses: actions/upload-artifact@v4
        with:
          name: Bookworm-portable-${{ matrix.CI_ARCH }}
          path: scripts\Bookworm-*-${{ matrix.CI_ARCH }}-portable.zip

      - name: Upload update bundle
        uses: actions/upload-artifact@v4
        with:
          name: Bookworm-bundle-${{ matrix.CI_ARCH }}
          path: scripts\Bookworm-*-${{ matrix.CI_ARCH }}-update.bundle

      - name: Upload update bundle checksum
        uses: actions/upload-artifact@v4
        with:
          name: Bookworm-bundle-checksum-${{ matrix.CI_ARCH }}
          path: scripts\Bookworm-*-${{ matrix.CI_ARCH }}-update.bundle.sha1

      - name: Upload translation catalogs
        if: matrix.CI_ARCH == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: translation-catalogs
          path: scripts\*.pot

      - name: Upload release info
        if: matrix.CI_ARCH == 'x64' && startsWith(github.ref, 'refs/tags') && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: scripts\release-info.json

  generate_update_info:
    name: Generate update-info.json
    runs-on: windows-latest
    needs: build
    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download update bundle checksums
        uses: actions/download-artifact@v4
        with:
          pattern: Bookworm-bundle-checksum-*
          path: scripts
          merge-multiple: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: ${{ runner.os }}-update-info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv sync --locked --no-install-project --only-group dev

      - name: Generate update-info.json
        env:
          PYTHONPATH: .
        run: |
          uv run invoke gen-update-info-file

      - name: Upload update-info.json
        uses: actions/upload-artifact@v4
        with:
          name: update-info
          path: update_info.json

  deploy:
    name: Deploy
    runs-on: windows-latest
    needs: [build, generate_update_info]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -Path upload -ItemType Directory -Force
          # Collect all files from artifacts, excluding internal checksum files
          Get-ChildItem -Path artifacts -Directory | 
            Where-Object { $_.Name -notlike "*-checksum-*" } | 
            ForEach-Object {
              Get-ChildItem -Path $_.FullName -File | Copy-Item -Destination upload
            }
          Write-Host "Prepared assets in upload directory:"
          Get-ChildItem -Path upload | Select-Object Name

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags') && github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'upload\*'
          draft: true
          generateReleaseNotes: true

  submit_update_info:
    name: Submit update_info.json to main
    runs-on: windows-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download update_info.json from release
        shell: pwsh
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          $ReleaseAssetsUrl = "${{ github.event.release.assets_url }}"
          $Headers = @{
            Authorization = "token $env:PAT_TOKEN"
            Accept = "application/vnd.github.v3+json"
          }
          $Assets = Invoke-RestMethod -Headers $Headers -Uri $ReleaseAssetsUrl
          $UpdateInfoAsset = $Assets | Where-Object { $_.name -eq "update_info.json" }
          if ($null -ne $UpdateInfoAsset) {
            Invoke-WebRequest -Headers $Headers -Uri $UpdateInfoAsset.browser_download_url -OutFile update_info.json
          } else {
            throw "update_info.json not found in release assets"
          }

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: 'Update update_info.json after release'
          branch: update-info/${{ github.run_id }}
          title: 'Update update_info.json after release'
          body: 'This Pull Request updates update_info.json after the release is published.'
          labels: 'automation'
          base: main
